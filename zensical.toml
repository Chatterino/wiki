[project]
site_name = "chatterino"
site_url = "https://wiki.chatterino.com"
use_directory_urls = true
extra_css = ["stylesheets/extra.css"]
  [project.theme]
  features = [
     "navigation.instant",
     "navigation.sections",
     "navigation.top",
     "content.action.edit",
     "content.action.view",
     "content.code.annotate",
     "search.highlight"

  ]
variant = "material"
  logo = "https://chatterino.com/logo.svg"
  favicon = "https://chatterino.com/logo.svg"
  [[project.theme.palette]]
      media= "(prefers-color-scheme: light)"
      scheme= "default"
      toggle.icon = "material/toggle-switch-off-outline"
      toggle.name = "Switch to dark mode"
  [[project.theme.palette]]

      media = "(prefers-color-scheme: dark)"
      scheme = "slate"
      toggle.icon ="material/toggle-switch"
      toggle.name = "Switch to light mode"

  [project.theme.icon]
    repo = "fontawesome/brands/github"
#plugins:
 # - git-revision-date-localized:
  #    type: datetime
   #   fallback_to_build_date: true
    #  enable_parallel_processing: false
#repo_url: https://github.com/chatterino/chatterino2
#edit_uri: "https://github.com/Chatterino/wiki/edit/master/docs/"
[project.markdown_extensions.admonition]

[project.markdown_extensions.attr_list]

[project.markdown_extensions.footnotes]

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true

[project.markdown_extensions.pymdownx.inlinehilite]

[project.markdown_extensions.pymdownx.snippets]

[project.markdown_extensions.pymdownx.superfences]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.toc]
    permalink = "true"

[project.markdown_extensions.pymdownx.emoji]
      emoji_index = "!!python/name:material.extensions.emoji.twemoji"
      emoji_generator = "!!python/name:material.extensions.emoji.to_svg"
[project.extra]


[[project.extra.social]]
      icon = "fontawesome/brands/discord"
      link = "https://discord.gg/qq7DDxjste"
      name = "Discord"
[[project.extra.social]]
      icon = "fontawesome/brands/github"
      link = "https://github.com/chatterino/chatterino2"
      name = "GitHub"
[[project.extra.social]]
      icon = "fontawesome/solid/dollar-sign"
      link = "https://streamelements.com/fourtf/tip"
      name = "Donate"

nav = [
  {"Section" = [
  "section/index.md",
   "Chat",
       "Commands: Commands.md" ,
       "Filters: Filters.md",
       "Search: Search.md",
       "Regex: Regex.md",
  "Features",
       "Twitch: Features.md",
       "Hotkeys: Hotkeys.md",
       "Image Uploader: Image Uploader.md",
       "Link Previews: Link Previews.md",
       "Moderation: Moderation.md",
       "Themes: Themes.md",
  "Help: Help.md",
   "Settings: Settings.md",
   "Third party services: Third_party_services.md",
   "Glossary: Glossary.md",
   "Developers",
       "Environment Variables: Environment Variables.md",
       "Crash Analysis: Crash Analysis.md",
       "Contributing: Contributing for Developers.md",
       "Logging: Developer Logs.md",
]}
]
