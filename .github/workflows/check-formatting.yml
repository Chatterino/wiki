---
name: Check formatting

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4

      - name: Check formatting with Prettier
        run: |
          npx prettier@3.8.1 --check .
